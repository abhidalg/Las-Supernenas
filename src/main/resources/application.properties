# --- CONFIGURACIÓN DE LA BASE DE DATOS ---
# URL: Indica que usamos postgres, en el puerto 5432 (por defecto) y el nombre de tu base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/LasSuperNenas

# Credenciales: El usuario (suele ser 'postgres') y la contraseńa que pusiste al instalarlo
spring.datasource.username=postgres
spring.datasource.password=tu_contraseńa

# Driver: El "idioma" que usará Java para hablar con Postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- CONFIGURACIÓN DE HIBERNATE / JPA ---
# ddl-auto=update: Esto es MAGIA. Hace que si ańades un campo a tu clase Java,
# se cree automáticamente en la tabla de Postgres sin que tengas que hacer nada.
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de IntelliJ las consultas SQL que hace el programa (útil para debugear)
spring.jpa.show-sql=true

# Indica que el dialecto es específicamente para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect